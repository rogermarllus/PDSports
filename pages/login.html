<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>PD Sports | Login</title>
</head>

<body>
    <form id="form-login">
        <div id="card-login">
            <figure>
                <img src="/img/logo 2.svg" alt="logo-PD-Sports" id="img-logo-pd-sports">
                <figcaption>logo PD Sports</figcaption>
            </figure>

            <h2 id="title-login">Entrar</h2>

            <div id="container-input-email">
                <label id="subtitle-input-email">Informe seu email</label>
                <input type="text" id="input-email" placeholder="emailexemplo@gmail.com">
            </div>

            <div id="container-password">
                <div id="container-input-password">
                    <label id="subtitle-input-password">Informe sua senha</label>
                    <input type="text" id="input-password" placeholder="Sua senha">
                </div>
                <a href="">
                    <p id="recovery-password">Esqueci minha senha</p>
                </a>
            </div>

            <div id="container-buttons-login">
                <a href="/index.html" id="link-back">
                    <button>Voltar</button>
                </a>

                <a href="/index.html" id="link-login">
                    <button>Entrar</button>
                </a>
            </div>

            <p id="go-signup">Não possui uma conta? <a href="" id="link-signup">Cadastrar-se</a></p>
        </div>
    </form>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
