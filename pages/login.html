<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PD Sports | Entrar</title>
    <link rel="icon" type="image/svg+xml" href="/img/svg/favicon.svg">

    <!-- Bibliotecas -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS do Projeto -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/login.css">

    <!-- Scripts de ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <form id="form-login">
        <div id="card-login">
            <figure>
                <img src="/img/svg/logo.svg" alt="logo-PD-Sports" id="img-logo-pd-sports">
                <figcaption>logo PD Sports</figcaption>
            </figure>

            <h2 id="title-login">Entrar</h2>

            <div class="container-input">
                <label class="subtitle-input">Seu e-mail</label>
                <input type="email" class="input-email" placeholder="E-mail">
                <span class="error"></span>
            </div>

            <div id="container-password">
                <div class="container-input">
                    <label class="subtitle-input">Crie uma senha</label>
                    <div id="container-input-password">
                        <input type="password" class="input-password form-control" placeholder="Senha"
                            autocomplete="off">
                        <i class="fa-regular fa-eye-slash password-icon"></i>
                    </div>
                    <span class="error"></span>
                </div>
                <a href="passwordReset.html">
                    <p id="recovery-password">Esqueci minha senha</p>
                </a>
            </div>

            <div id="container-buttons-login">
                <a href="/index.html" id="link-back">Voltar</a>
                <button type="submit" id="btn-login">Entrar</button>
            </div>

            <p id="txt-quest-authenticated">Não possui uma conta? <a href="register.html"
                    id="link-signup">Cadastrar-se</a></p>
        </div>
    </form>

    <script type="module" src="../js/login.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/form-login.js"></script>
    <script src="/js/lucide-icons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
