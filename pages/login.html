<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="icon" type="image/svg+xml" href="/img/svg/favicon.svg">
    <title>PD Sports | Entrar</title>
</head>

<body>
    <form id="form-login">
        <div id="card-login">
            <figure>
                <img src="/img/svg/logo.svg" alt="logo-PD-Sports" id="img-logo-pd-sports">
                <figcaption>logo PD Sports</figcaption>
            </figure>

            <h2 id="title-login">Entrar</h2>

            <div id="container-input">
                <label id="subtitle-input">Informe seu email</label>
                <input type="text" id="input-email" placeholder="emailexemplo@gmail.com">
            </div>

            <div id="container-password">
                <div id="container-input">
                    <label id="subtitle-input">Informe sua senha</label>
                    <input type="password" id="input-password" placeholder="Sua senha">
                </div>
                <a href="passwordReset.html">
                    <p id="recovery-password">Esqueci minha senha</p>
                </a>
            </div>

            <div id="container-buttons-login">
                <a href="/index.html" id="link-back">Voltar</a>
                <button type="submit" id="btn-login">Entrar</button>
            </div>

            <p id="txt-quest-authenticated">Não possui uma conta? <a href="register.html"
                    id="link-signup">Cadastrar-se</a></p>
        </div>
    </form>

    <script type="module" src="../js/login.js"></script>
</body>

</html>
