<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../img/favicon.svg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/passwordReset.css">
    <link rel="icon" type="image/svg+xml" href="/img/svg/favicon.svg">
    <title>PD Sports | Recuperação de Senha</title>
</head>

<body class="container">

    <form id="form-password-reset">
        <img src="/img/svg/logo.svg" alt="logo-PD-Sports" class="img-logo">

        <p>
            <label for="input-email">Informe o seu e-mail</label>
            <input type="email" id="input-email" placeholder="emailexemplo@gmail.com">
        </p>

        <div class="recaptcha">
            <input type="checkbox" name="recaptcha" id="recaptcha">
            <label for="recaptcha">Não sou um robô</label>
            <div class="recaptcha-logo">
                <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA" />
                <small>reCAPTCHA</small>
            </div>
        </div>

        <div>
            <a href="login.html" class="btn-voltar">Voltar</a>
            <button type="submit" class="botao">Enviar</button>
        </div>
    </form>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/lucide-icons.js"></script>
</body>

</html>
