<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PD Sports | Recuperação de Senha</title>
    <link rel="icon" type="image/svg+xml" href="/img/svg/favicon.svg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/passwordReset.css">
    <link rel="stylesheet" href="/css/formValidation.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <form id="form-password-reset">
        <img src="/img/svg/logo.svg" alt="logo-PD-Sports" class="img-logo">

        <h2>Recuperar Senha</h2>

        <div>
            <label for="input-email">Informe o e-mail cadastrado</label>
            <input type="email" id="input-email" placeholder="emailexemplo@gmail.com">
        </div>

        <div class="recaptcha">
            <input type="checkbox" name="recaptcha" id="recaptcha">
            <label for="recaptcha">Não sou um robô</label>
            <div class="recaptcha-logo">
                <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA" />
                <small>reCAPTCHA</small>
            </div>
        </div>

        <div class="container-buttons">
            <a href="/pages/login.html" class="btn-voltar">Voltar</a>
            <button type="submit" class="botao">Enviar</button>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="/js/lucide-icons.js"></script>
    <script type="module">
        import { initPasswordResetForm } from '/js/formValidation.js';
        document.addEventListener('DOMContentLoaded', initPasswordResetForm);
    </script>
</body>

</html>
